<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stichting The V.O.I.C.E. NL</title>
    <link rel="preload" href="/favicon.png" as="image" type="image/png" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="shortcut icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&display=swap"
    />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
      (function () {
        var prefKey = "voice-theme-preference";
        var legacyKey = "voice-theme";
        var pref = localStorage.getItem(prefKey);
        if (pref !== "light" && pref !== "dark" && pref !== "auto") {
          var legacy = localStorage.getItem(legacyKey);
          pref = legacy === "light" || legacy === "dark" ? legacy : "auto";
        }
        var theme;
        if (pref === "light" || pref === "dark") {
          theme = pref;
        } else {
          var hour = new Date().getHours();
          theme = hour >= 6 && hour < 20 ? "light" : "dark";
        }
        document.documentElement.setAttribute("data-theme", theme);
      })();
      document.documentElement.classList.add("splash-open");
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
